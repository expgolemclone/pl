<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>8595 損益計算書推移</title>
<style>
:root {
  color-scheme: dark;
  --paper: #0d100f;
  --ink: #f0eadb;
  --muted: #a8ad9f;
  --line: #34392f;
  --panel: #151917;
  --panel-2: #1f2a24;
  --accent: #55d6c2;
  --accent-2: #ff6b57;
  --accent-3: #f4b942;
  --warn: #f2a65a;
  --shadow: rgba(0, 0, 0, 0.45);
}
* { box-sizing: border-box; }
html {
  width: 100%;
  max-width: 100%;
  overflow-x: clip;
}
body {
  margin: 0;
  width: 100%;
  max-width: 100%;
  overflow-x: clip;
  background:
    radial-gradient(circle at 12% 8%, rgba(85,214,194,0.09), transparent 28%),
    linear-gradient(90deg, rgba(240,234,219,0.045) 1px, transparent 1px) 0 0 / 22px 22px,
    linear-gradient(rgba(240,234,219,0.035) 1px, transparent 1px) 0 0 / 22px 22px,
    var(--paper);
  color: var(--ink);
  font-family: "IBM Plex Sans", "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
  letter-spacing: 0;
}
button, input { font: inherit; }
.shell {
  width: 100%;
  min-width: 0;
  min-height: 100vh;
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  grid-template-rows: auto 1fr;
  overflow-x: clip;
}
header {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 24px;
  align-items: end;
  padding: 28px clamp(18px, 3vw, 44px) 20px;
  border-bottom: 2px solid var(--ink);
  background: rgba(13, 16, 15, 0.94);
  min-width: 0;
}
header > * {
  min-width: 0;
}
.kicker {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  color: var(--muted);
  font-size: 12px;
  text-transform: uppercase;
}
h1 {
  margin: 4px 0 0;
  max-width: 100%;
  font-family: Georgia, "Yu Mincho", "Hiragino Mincho ProN", serif;
  font-size: clamp(30px, 5vw, 64px);
  line-height: 0.95;
  font-weight: 700;
  overflow-wrap: normal;
}
.title-company,
.title-subject {
  display: inline-block;
  max-width: 100%;
  vertical-align: baseline;
}
.title-company {
  overflow-wrap: anywhere;
}
.title-subject {
  white-space: nowrap;
}
.meta {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  min-width: min(100%, 320px);
}
.stat {
  min-width: 0;
  min-height: 58px;
  padding: 9px 12px;
  border: 1px solid var(--ink);
  background: var(--panel);
  box-shadow: 4px 4px 0 rgba(240,234,219,0.2);
}
.stat b {
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 18px;
  line-height: 1.1;
}
.stat span {
  color: var(--muted);
  font-size: 11px;
}
.stage {
  width: 100%;
  min-width: 0;
  max-width: 100%;
  padding: clamp(16px, 3vw, 36px);
  overflow-x: clip;
}
.chart-panel {
  width: 100%;
  min-width: 0;
  max-width: 100%;
  border: 2px solid var(--ink);
  background: var(--panel);
  box-shadow: 8px 8px 0 rgba(240,234,219,0.16);
}
.series-dot {
  width: 9px;
  height: 9px;
  background: var(--series-color);
  box-shadow: 0 0 0 1px var(--ink);
}
.canvas-wrap {
  position: relative;
  width: 100%;
  height: clamp(300px, 48vh, 560px);
  padding: 14px;
}
#detailChart {
  width: 100%;
  height: 100%;
  display: block;
}
.tooltip {
  width: 100%;
  min-width: 0;
  min-height: 64px;
  max-height: 150px;
  padding: 10px 14px;
  border-top: 1px solid var(--line);
  background: #101411;
  font-size: 12px;
  overflow-y: auto;
  overscroll-behavior: contain;
  visibility: hidden;
}
.tooltip.is-visible {
  visibility: visible;
}
.tooltip > b {
  display: block;
  margin-bottom: 2px;
}
.guide-line {
  position: absolute;
  z-index: 2;
  top: 0;
  bottom: 0;
  width: 1px;
  pointer-events: none;
  display: none;
  background: rgba(240,234,219,0.18);
}
.tooltip-row {
  display: grid;
  grid-template-columns: 9px minmax(0, 1fr) auto;
  gap: 7px;
  align-items: center;
  margin-top: 6px;
}
.tooltip-row span:nth-child(2) {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.tooltip-row strong {
  color: var(--series-color);
  font-weight: 700;
}
.period-strip {
  display: grid;
  grid-template-columns: repeat(var(--period-count), minmax(46px, 1fr));
  max-width: 100%;
  overflow-x: auto;
  overscroll-behavior-x: contain;
  border-top: 1px solid var(--ink);
}
.period-cell {
  min-width: 46px;
  padding: 8px 6px;
  border-right: 1px solid var(--line);
  text-align: center;
  color: var(--muted);
  font-size: 11px;
}
.period-cell:last-child { border-right: 0; }
.table-panel {
  margin-top: 28px;
  width: 100%;
  max-width: 100%;
  border: 2px solid var(--ink);
  background: rgba(21,25,23,0.8);
  box-shadow: 8px 8px 0 rgba(240,234,219,0.16);
  overflow-x: auto;
  overscroll-behavior-x: contain;
  contain: inline-size layout paint;
}
.table-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 2px solid var(--ink);
  background: var(--panel);
}
.search {
  flex: 1 1 220px;
  height: 36px;
  border: 1px solid var(--ink);
  background: #0f1311;
  color: var(--ink);
  padding: 0 12px;
  outline-offset: 3px;
}
.seg {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  border: 1px solid var(--ink);
}
.seg button {
  height: 36px;
  border: 0;
  border-right: 1px solid var(--ink);
  background: #0f1311;
  color: var(--ink);
  cursor: pointer;
}
.seg button:last-child { border-right: 0; }
.seg button.active {
  background: var(--ink);
  color: var(--panel);
}
.select-all-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border: 1px solid var(--ink);
}
.select-all-row button {
  height: 36px;
  border: 0;
  border-right: 1px solid var(--ink);
  background: #0f1311;
  color: var(--ink);
  cursor: pointer;
  transition: background 0.12s;
}
.select-all-row button:last-child { border-right: 0; }
.select-all-row button:hover {
  background: var(--panel-2);
}
table {
  width: max-content;
  border-collapse: collapse;
  min-width: 100%;
}
th, td {
  padding: 9px 10px;
  border-bottom: 1px solid var(--line);
  text-align: right;
  font-variant-numeric: tabular-nums;
}
th {
  background: var(--ink);
  color: var(--paper);
  font-size: 12px;
  position: sticky;
  top: 0;
  z-index: 2;
}
th.col-toggle {
  width: 36px;
  min-width: 36px;
}
th.col-label {
  position: sticky;
  left: 0;
  z-index: 3;
  text-align: left;
  min-width: 160px;
  max-width: 160px;
}
th.col-spark {
  width: 100px;
  min-width: 100px;
}
th.col-cagr {
  width: 76px;
  min-width: 76px;
}
td.col-toggle {
  width: 36px;
  min-width: 36px;
  text-align: center;
  position: sticky;
  left: 0;
  z-index: 1;
  background: var(--panel);
}
td.col-label {
  position: sticky;
  left: 36px;
  z-index: 1;
  text-align: left;
  background: var(--panel);
  min-width: 160px;
  max-width: 160px;
}
td.col-spark {
  width: 100px;
  min-width: 100px;
}
td.col-cagr {
  width: 76px;
  min-width: 76px;
}
td.col-label b {
  display: block;
  overflow-wrap: anywhere;
}
td.col-label span {
  color: var(--muted);
  font-size: 11px;
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
tr.selected-row td {
  background: rgba(85,214,194,0.08);
}
tr.selected-row td.col-toggle {
  box-shadow: inset 4px 0 0 var(--series-color);
}
tr.selected-row td.col-toggle .cell-toggle {
  border-color: var(--series-color);
  background: var(--series-color);
}
.cell-toggle {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 1px solid var(--ink);
  background: #0f1311;
  box-shadow: 2px 2px 0 rgba(240,234,219,0.16);
}
.spark {
  display: block;
  width: 92px;
  height: 36px;
}
tr.data-row {
  cursor: pointer;
}
tr.data-row:hover td {
  background: var(--panel-2);
}
tr.hidden-row {
  display: none;
}
.empty {
  padding: 28px 16px;
  color: var(--muted);
}
.forecast-toggle {
  height: 36px;
  padding: 0 14px;
  border: 1px solid var(--ink);
  background: #0f1311;
  color: var(--ink);
  cursor: pointer;
  transition: background 0.12s;
  font-size: 12px;
  white-space: nowrap;
}
.forecast-toggle.active {
  background: var(--accent-3);
  color: var(--paper);
  border-color: var(--accent-3);
}
.forecast-toggle:hover {
  background: var(--panel-2);
}
.forecast-toggle.active:hover {
  background: #d9a33a;
}
.period-cell.forecast {
  color: var(--accent-3);
  font-style: italic;
  background: rgba(244,185,66,0.06);
}
td.forecast-cell {
  color: var(--accent-3);
  font-style: italic;
  opacity: 0.85;
}
.cagr-cell {
  color: var(--accent-3);
  font-weight: 700;
  white-space: nowrap;
}
@media (max-width: 1200px) {
  header {
    grid-template-columns: minmax(0, 1fr);
  }
  .meta {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}
@media (max-width: 640px) {
  header {
    padding: 22px 18px 16px;
  }
  .stage {
    padding: 12px;
  }
  .chart-panel,
  .table-panel {
    border-width: 1px;
    box-shadow: 4px 4px 0 rgba(240,234,219,0.14);
  }
  .meta {
    grid-template-columns: 1fr;
    min-width: 0;
  }
  h1 {
    font-size: clamp(30px, 10vw, 42px);
  }
  .canvas-wrap {
    height: clamp(260px, 48vh, 420px);
    padding: 10px;
  }
  .tooltip {
    max-height: 190px;
  }
  .period-strip {
    grid-template-columns: repeat(var(--period-count), minmax(64px, 1fr));
  }
  .period-cell {
    min-width: 64px;
  }
  .table-panel {
    overflow-x: visible;
  }
  .table-controls {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    padding: 10px;
  }
  .search,
  .seg,
  .select-all-row,
  .forecast-toggle {
    min-width: 0;
    width: 100%;
  }
  .seg button,
  .select-all-row button,
  .forecast-toggle {
    min-height: 42px;
  }
  table,
  tbody {
    display: block;
    width: 100%;
    min-width: 0;
  }
  thead {
    display: none;
  }
  th,
  td {
    padding: 0;
    border-bottom: 0;
  }
  tr.data-row {
    display: grid;
    grid-template-columns: 24px minmax(0, 1fr) minmax(82px, auto);
    gap: 3px 10px;
    align-items: center;
    min-height: 72px;
    padding: 10px 8px;
    border-bottom: 1px solid var(--line);
  }
  tr.data-row.hidden-row {
    display: none;
  }
  tr.data-row:hover td,
  tr.selected-row td {
    background: transparent;
  }
  tr.selected-row {
    background: rgba(85,214,194,0.08);
  }
  td.col-toggle {
    grid-column: 1;
    grid-row: 1 / 3;
    position: static;
    width: 24px;
    min-width: 24px;
    text-align: left;
    background: transparent;
  }
  tr.selected-row td.col-toggle {
    box-shadow: inset 3px 0 0 var(--series-color);
  }
  .cell-toggle {
    width: 16px;
    height: 16px;
    box-shadow: none;
  }
  td.col-label {
    grid-column: 2;
    grid-row: 1;
    position: static;
    min-width: 0;
    max-width: none;
    background: transparent;
  }
  td.col-label b {
    font-size: 14px;
    line-height: 1.25;
  }
  td.col-label span {
    font-size: 10px;
  }
  td.col-spark {
    grid-column: 2 / 4;
    grid-row: 2;
    width: auto;
    min-width: 0;
  }
  .spark {
    width: min(170px, 52vw);
    height: 32px;
  }
  td.col-cagr {
    grid-column: 2 / 4;
    grid-row: 3;
    width: auto;
    min-width: 0;
    text-align: left;
    font-size: 11px;
  }
  td.col-cagr::before {
    content: "CAGR ";
    color: var(--muted);
    font-weight: 400;
  }
  td.value-cell,
  td.forecast-cell {
    display: none;
  }
  td.latest-cell {
    display: block;
    grid-column: 3;
    grid-row: 1;
    align-self: start;
    text-align: right;
    color: var(--ink);
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
  }
  td.latest-cell::before {
    content: attr(data-period);
    display: block;
    color: var(--muted);
    font-size: 10px;
    font-weight: 400;
  }
}
</style>
</head>

<div class="shell">
  <header>
    <div>
      <div class="kicker">
        <span>EDINET XBRL</span>
        <span id="scopeLabel"></span>
        <span id="sourceLabel"></span>
      </div>
      <h1 id="title"></h1>
    </div>
    <div class="meta">

  <section class="stage">

    <div class="table-panel">

          <button type="button" data-unit="1">円</button>
          <button type="button" data-unit="1000000" class="active">百万円</button>
          <button type="button" data-unit="100000000">億円</button>
        </div>
        <div class="select-all-row">

          <button type="button" id="deselectAllBtn">全解除</button>
        </div>
        <button type="button" id="forecastToggle" class="forecast-toggle" aria-pressed="false" title="CAGR = (Vlast / Vfirst)^(1 / gaps) - 1. gaps = index distance between the first and last non-null values.">CAGR forecast</button>
      </div>
      <table>
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </section>
</div>

const formatCagr = (value) => {
  if (value === null || value === undefined || Number.isNaN(value)) return "-";
  const pct = value * 100;
  const sign = pct > 0 ? "+" : "";
  return sign + pct.toLocaleString("ja-JP", { maximumFractionDigits: 1 }) + "%";
};

function toggleItemSelection(conceptName) {
  if (selectedConcepts.includes(conceptName)) {
    if (selectedConcepts.length > 1) {
      selectedConcepts = selectedConcepts.filter((concept) => concept !== conceptName);
    }
  } else {
    selectedConcepts = [...selectedConcepts, conceptName];
  }
  renderAll();
}

function toggleForecast() {
  showForecast = !showForecast;
  const btn = el("forecastToggle");
  btn.classList.toggle("active", showForecast);
  btn.setAttribute("aria-pressed", String(showForecast));
  renderAll();
}

function initHeader() {
  const latestReport = data.selected_reports[data.selected_reports.length - 1];
  const title = el("title");
  const titleCompany = document.createElement("span");
  const titleSubject = document.createElement("span");
  titleCompany.className = "title-company";
  titleSubject.className = "title-subject";
  titleCompany.textContent = `${data.ticker} ${data.name || ""}`.trim();
  titleSubject.textContent = "損益計算書";
  title.textContent = "";
  title.appendChild(titleCompany);
  title.appendChild(document.createTextNode(" "));
  title.appendChild(titleSubject);
  el("scopeLabel").textContent = scopeText(latestReport.consolidation_scope);
  el("sourceLabel").textContent = sourceText(data.source);
  el("periodCount").textContent = data.periods.length;
  el("itemCount").textContent = data.items.length;
  el("latestDoc").textContent = latestReport.doc_id;
  renderPeriodStrip();
  renderTableHeader();
}

function renderPeriodStrip() {
  const allPeriods = showForecast ? [...data.periods, ...data.forecast_periods] : data.periods;
  el("periodStrip").style.setProperty("--period-count", allPeriods.length);
  el("periodStrip").innerHTML = allPeriods.map((period, index) => {
    const isForecast = index >= data.periods.length;
    return `<div class="period-cell${isForecast ? " forecast" : ""}">${period}</div>`;
  }).join("");
}

function renderTableHeader() {
  const fcHeaders = showForecast ? data.forecast_periods.map((p) => `<th class="forecast-cell">${p}</th>`).join("") : "";
  const cagrHeader = showForecast ? `<th class="col-cagr cagr-cell" title="CAGR = (Vlast / Vfirst)^(1 / gaps) - 1">CAGR</th>` : "";
  el("tableHead").innerHTML = `<tr><th class="col-toggle"></th><th class="col-label">項目</th><th class="col-spark">推移</th>${cagrHeader}${data.periods.map((period) => `<th>${period}</th>`).join("")}${fcHeaders}</tr>`;
}

function sparkline(values, strokeColor) {
  const width = 92;
  const height = 36;
  const present = values.map((value, index) => [value, index]).filter(([value]) => value !== null && value !== undefined);
  if (present.length < 2) return `<svg class="spark" viewBox="0 0 ${width} ${height}" aria-hidden="true"></svg>`;
  const ys = present.map(([value]) => scaleValue(value));
  let min = Math.min(...ys);
  let max = Math.max(...ys);
  if (min === max) {
    min -= 1;
    max += 1;
  }
  const points = present.map(([value, index]) => {
    const x = values.length === 1 ? width / 2 : (index / (values.length - 1)) * (width - 8) + 4;
    const y = height - 4 - ((scaleValue(value) - min) / (max - min)) * (height - 8);
    return `${x.toFixed(2)},${y.toFixed(2)}`;
  });
  return `<svg class="spark" viewBox="0 0 ${width} ${height}" aria-hidden="true">
    <polyline points="${points.join(" ")}" fill="none" stroke="${strokeColor}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"></polyline>
  </svg>`;
}

function renderTable() {
  const query = el("search").value.trim().toLowerCase();
  const rows = data.items.map((item) => {
    const selectedIndex = selectedIndexOf(item);
    const isSelected = selectedIndex !== -1;
    const color = isSelected ? selectedColor(item.concept_name) : "";
    const sparkColor = isSelected ? color : inactiveSparkColor;
    const haystack = `${item.label} ${item.concept_name}`.toLowerCase();
    const hidden = query && !haystack.includes(query);
    const cagrCell = showForecast ? `<td class="col-cagr cagr-cell">${formatCagr(item.cagr)}</td>` : "";
    const fcCells = showForecast ? item.forecast_values.map((value) => `<td class="forecast-cell">${compactValue(value)}</td>`).join("") : "";
    return `
    <tr class="${isSelected ? "selected-row" : ""} ${hidden ? "hidden-row" : ""} data-row" data-concept="${item.concept_name}" style="${isSelected ? "--series-color: " + color : ""}">
      <td class="col-toggle"><span class="cell-toggle" aria-hidden="true"></span></td>
      <td class="col-label"><b>${item.label}</b><span>${item.concept_name}</span></td>
      <td class="col-spark">${sparkline(item.values, sparkColor)}</td>
      ${cagrCell}
      ${item.values.map((value, index) => `<td class="value-cell${index === data.periods.length - 1 ? " latest-cell" : ""}" data-period="${data.periods[index]}">${compactValue(value)}</td>`).join("")}
      ${fcCells}
    </tr>
  `;
  }).join("");
  el("tableBody").innerHTML = rows;
  document.querySelectorAll(".data-row").forEach((row) => {
    row.addEventListener("click", () => {
      toggleItemSelection(row.dataset.concept);
    });
  });
}

function setCanvasSize(canvas) {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.max(1, Math.round(rect.width * dpr));
  canvas.height = Math.max(1, Math.round(rect.height * dpr));
  const ctx = canvas.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { ctx, width: rect.width, height: rect.height };
}

function hideChartHover() {
  el("tooltip").classList.remove("is-visible");
  el("guideLine").style.display = "none";
}

function drawChart() {
  const canvas = el("detailChart");
  const { ctx, width, height } = setCanvasSize(canvas);
  ctx.clearRect(0, 0, width, height);
  hideChartHover();
  const series = selectedItems();
  const compact = width < 560;
  const padding = {
    left: compact ? 60 : 76,
    right: compact ? 14 : 24,
    top: 28,
    bottom: compact ? 46 : 54
  };
  const chartWidth = width - padding.left - padding.right;
  const chartHeight = height - padding.top - padding.bottom;
  const actualCount = data.periods.length;
  const fcCount = showForecast ? data.forecast_periods.length : 0;
  const totalSlots = actualCount + fcCount;

  const scaledActual = series.map((item) => item.values.map(scaleValue));
  const scaledFc = series.map((item) => showForecast ? item.forecast_values.map(scaleValue) : []);

  const allValues = [
    ...scaledActual.flat(),
    ...scaledFc.flat(),
  ].filter((value) => value !== null && value !== undefined);
  if (!allValues.length) return;

  let min = Math.min(...allValues, 0);
  let max = Math.max(...allValues, 0);
  if (min === max) {
    min -= 1;
    max += 1;
  }
  const pad = (max - min) * 0.12;
  min -= pad;
  max += pad;
  const xAt = (index) => padding.left + (totalSlots === 1 ? chartWidth / 2 : index / (totalSlots - 1) * chartWidth);
  const yAt = (value) => padding.top + (max - value) / (max - min) * chartHeight;

  ctx.strokeStyle = canvasTheme.grid;
  ctx.lineWidth = 1;
  ctx.setLineDash([]);
  ctx.fillStyle = canvasTheme.text;
  ctx.font = `${compact ? 11 : 12}px Yu Gothic, Hiragino Kaku Gothic ProN, sans-serif`;
  ctx.textAlign = "right";
  ctx.textBaseline = "middle";
  for (let i = 0; i <= 4; i++) {
    const value = min + (max - min) * i / 4;
    const y = yAt(value);
    ctx.beginPath();
    ctx.moveTo(padding.left, y);
    ctx.lineTo(width - padding.right, y);
    ctx.stroke();
    ctx.fillText(value.toLocaleString("ja-JP", { maximumFractionDigits: 1 }), padding.left - 10, y);
  }

  const zeroY = yAt(0);
  if (zeroY > padding.top && zeroY < height - padding.bottom) {
    ctx.strokeStyle = canvasTheme.zero;
    ctx.lineWidth = 1.6;
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(padding.left, zeroY);
    ctx.lineTo(width - padding.right, zeroY);
    ctx.stroke();
  }

  /* X-axis labels */
  const allPeriodLabels = [...data.periods, ...(showForecast ? data.forecast_periods : [])];
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  const visibleLabels = Math.max(2, Math.floor(chartWidth / (compact ? 76 : 64)));
  const labelStep = Math.max(1, Math.ceil(totalSlots / visibleLabels));
  allPeriodLabels.forEach((period, index) => {
    if (index !== 0 && index !== totalSlots - 1 && index % labelStep !== 0) return;
    const x = xAt(index);
    ctx.fillStyle = index >= actualCount ? "#f4b942" : canvasTheme.text;
    ctx.fillText(period, x, height - padding.bottom + 18);
  });

  /* Draw each series */
  series.forEach((item, seriesIndex) => {
    const actual = scaledActual[seriesIndex];
    const fc = scaledFc[seriesIndex];
    const color = selectedColor(item.concept_name);

    /* Solid actual line */
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.lineJoin = "round";
    ctx.lineCap = "round";
    ctx.setLineDash([]);
    ctx.beginPath();
    let started = false;
    actual.forEach((value, index) => {
      if (value === null || value === undefined) {
        started = false;
        return;
      }
      const x = xAt(index);
      const y = yAt(value);
      if (!started) {
        ctx.moveTo(x, y);
        started = true;
      } else {
        ctx.lineTo(x, y);
      }
    });
    ctx.stroke();

    /* Actual points (filled) */
    actual.forEach((value, index) => {
      if (value === null || value === undefined) return;
      const x = xAt(index);
      const y = yAt(value);
      ctx.setLineDash([]);
      ctx.fillStyle = canvasTheme.pointFill;
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y, 4.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    });

    /* Dashed forecast line */
    if (showForecast && fc.length) {
      const lastActualIndex = actual.reduce((last, value, index) => value !== null && value !== undefined ? index : last, -1);
      const lastActualVal = lastActualIndex >= 0 ? actual[lastActualIndex] : null;
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.5;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      let fcStarted = false;
      if (lastActualVal !== null) {
        ctx.moveTo(xAt(lastActualIndex), yAt(lastActualVal));
        fcStarted = true;
      }
      fc.forEach((value, fcIndex) => {
        if (value === null || value === undefined) {
          fcStarted = false;
          return;
        }
        const x = xAt(actualCount + fcIndex);
        const y = yAt(value);
        if (!fcStarted) {
          ctx.moveTo(x, y);
          fcStarted = true;
        } else {
          ctx.lineTo(x, y);
        }
      });
      ctx.stroke();
      ctx.setLineDash([]);

      /* Forecast points (hollow) */
      fc.forEach((value, fcIndex) => {
        if (value === null || value === undefined) return;
        const x = xAt(actualCount + fcIndex);
        const y = yAt(value);
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.fillStyle = canvasTheme.pointFill;
        ctx.beginPath();
        ctx.arc(x, y, 4.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      });
    }
  });

  /* Hover / tooltip */
  canvas.onmousemove = (event) => {
    const rect = canvas.getBoundingClientRect();
    const x = event.clientX - rect.left;
    const nearest = allPeriodLabels
      .map((period, index) => ({ period, index, dist: Math.abs(xAt(index) - x), isForecast: index >= actualCount }))
      .sort((a, b) => a.dist - b.dist)[0];
    const entries = series
      .map((item, index) => {
        let rawValue, scaledVal;
        if (nearest.isForecast) {
          rawValue = item.forecast_values[nearest.index - actualCount];
          scaledVal = scaleValue(rawValue);
        } else {
          rawValue = item.values[nearest.index];
          scaledVal = scaleValue(rawValue);
        }
        return { item, index, rawValue, scaledValue: scaledVal, isForecast: nearest.isForecast };
      })
      .filter((entry) => entry.rawValue !== null && entry.rawValue !== undefined);
    const tip = el("tooltip");
    const guide = el("guideLine");
    if (!entries.length) {
      hideChartHover();
      return;
    }
    const pointX = xAt(nearest.index);
    const fcTag = nearest.isForecast ? " <span style=\"color:#f4b942;font-size:10px\">(予測)</span>" : "";

    tip.innerHTML = `<b>${nearest.period}${fcTag}</b>${entries.map((entry) => `
      <div class="tooltip-row" style="--series-color: ${selectedColor(entry.item.concept_name)}">
        <span class="series-dot"></span>
        <span>${entry.item.label}</span>
        <strong>${formatValue(entry.rawValue)}${entry.isForecast ? " / CAGR " + formatCagr(entry.item.cagr) : ""}</strong>
      </div>
    `).join("")}`;
    tip.classList.add("is-visible");

    guide.style.left = `${pointX}px`;
    guide.style.display = "block";
  };
  canvas.onmouseleave = hideChartHover;
}

function scheduleChartDraw() {
  cancelAnimationFrame(chartResizeFrame);
  chartResizeFrame = requestAnimationFrame(drawChart);
}

function renderAll() {
  renderPeriodStrip();
  renderTableHeader();
  renderTable();
  drawChart();
}

document.querySelectorAll("[data-unit]").forEach((button) => {
  button.addEventListener("click", () => {
    unit = Number(button.dataset.unit);
    document.querySelectorAll("[data-unit]").forEach((item) => item.classList.toggle("active", item === button));
    renderAll();
  });
});
el("selectAllBtn").addEventListener("click", () => {
  const toAdd = data.items.filter((item) => !selectedConcepts.includes(item.concept_name));
  if (toAdd.length) {
    selectedConcepts = [...selectedConcepts, ...toAdd.map((item) => item.concept_name)];
    renderAll();
  }
});
el("deselectAllBtn").addEventListener("click", () => {
  selectedConcepts = initialItem ? [initialItem.concept_name] : [];
  renderAll();
});
el("search").addEventListener("input", renderTable);
el("forecastToggle").addEventListener("click", toggleForecast);
window.addEventListener("resize", scheduleChartDraw);
if ("ResizeObserver" in window) {
  const chartResizeObserver = new ResizeObserver(scheduleChartDraw);
  chartResizeObserver.observe(el("detailChart"));
}
initHeader();
renderAll();
</script>
</body>
</html>
