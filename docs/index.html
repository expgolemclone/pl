<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PL trend reports</title>
<style>
:root {
  color-scheme: dark;
  --bg: #0d100f;
  --fg: #f0eadb;
  --muted: #a8ad9f;
  --line: #34392f;
  --panel: #151917;
  --accent: #55d6c2;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--fg);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
main {
  width: min(920px, calc(100% - 32px));
  margin: 0 auto;
  padding: 56px 0;
}
h1 {
  margin: 0 0 12px;
  font-size: clamp(2rem, 4vw, 3.5rem);
  font-weight: 800;
}
p {
  margin: 0 0 28px;
  color: var(--muted);
}
.reports {
  display: grid;
  gap: 12px;
}
a {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  padding: 18px 20px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  color: var(--fg);
  text-decoration: none;
}
a:hover,
a:focus-visible {
  border-color: var(--accent);
  outline: none;
}
.ticker {
  font-weight: 800;
  letter-spacing: 0;
}
.name {
  color: var(--muted);
}
@media (max-width: 560px) {
  main {
    width: min(100% - 24px, 920px);
    padding: 36px 0;
  }
  a {
    display: block;
  }
  .name {
    display: block;
    margin-top: 4px;
  }
}
</style>
</head>
<body>
<main>
  <h1>PL trend reports</h1>
  <p>Published HTML reports.</p>
  <nav class="reports" aria-label="Published reports">
    <a href="reports/6142_pl_trends.html"><span class="ticker">6142</span><span class="name">富士精工</span></a>
    <a href="reports/7175_pl_trends.html"><span class="ticker">7175</span><span class="name">今村証券</span></a>
    <a href="reports/7218_pl_trends.html"><span class="ticker">7218</span><span class="name">田中精密工業</span></a>
    <a href="reports/4776_pl_trends.html"><span class="ticker">4776</span><span class="name">サイボウズ</span></a>
    <a href="reports/8473_pl_trends.html"><span class="ticker">8473</span><span class="name">SBI HD</span></a>
    <a href="reports/8595_pl_trends.html"><span class="ticker">8595</span><span class="name">ジャフコグループ</span></a>
  </nav>
</main>
</body>
</html>
